name: Deploy Dormitory to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dormitory/**'
      - '.github/workflows/deploy-dormitory.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML files
        run: |
          for f in dormitory/*.html dormitory/common/index.html dormitory/inbox/index.html dormitory/rooms/*/index.html; do
            echo "Checking $f"
            # Basic HTML validation
            grep -q '<!DOCTYPE html>' "$f" || (echo "Missing DOCTYPE in $f" && exit 1)
            grep -q '</html>' "$f" || (echo "Missing closing html in $f" && exit 1)
          done
          echo "HTML validation passed ✓"
      - name: Check JavaScript syntax
        run: |
          node --check dormitory/config.js
          node --check dormitory/lights.js
          node --check dormitory/mailbox.js
          node --check dormitory/inbox.js
          node --check dormitory/tests/mailbox_contract.test.js
          node --check dormitory/tests/internal_links.test.js
          echo "JavaScript syntax checks passed ✓"
      - name: Verify internal navigation
        run: node dormitory/tests/internal_links.test.js
      - name: Verify mailbox privacy contract
        run: node dormitory/tests/mailbox_contract.test.js
      - name: Verify account helper
        run: |
          python3 -m py_compile dormitory/scripts/create_house_account.py
          python3 dormitory/scripts/create_house_account.py --help > /dev/null
          echo "Account helper check passed ✓"
      - name: Verify agent mailbox CLI
        run: |
          python3 -m py_compile dormitory/mailbox_cli.py dormitory/tests/mailbox_cli_test.py
          python3 dormitory/mailbox_cli.py --help > /dev/null
          python3 dormitory/tests/mailbox_cli_test.py
          echo "Agent mailbox CLI checks passed ✓"
      - name: Verify room controls
        run: python3 dormitory/tests/room_config_test.py
      - name: Verify shared asset paths
        run: |
          for f in dormitory/rooms/*/index.html; do
            grep -q 'href="../../style.css"' "$f" || (echo "Wrong stylesheet path in $f" && exit 1)
            grep -q 'src="../../lights.js"' "$f" || (echo "Wrong light source path in $f" && exit 1)
            grep -q 'src="../../config.js"' "$f" || (echo "Wrong mailbox config path in $f" && exit 1)
            grep -q 'src="../../mailbox.js"' "$f" || (echo "Wrong mailbox component path in $f" && exit 1)
            grep -q 'href="../../common/"' "$f" || (echo "Wrong bulletin board path in $f" && exit 1)
          done
          grep -q 'href="../style.css"' dormitory/common/index.html || (echo "Wrong common-room stylesheet path" && exit 1)
          grep -q 'src="../config.js"' dormitory/common/index.html || (echo "Wrong common-room mailbox config path" && exit 1)
          grep -q 'src="../mailbox.js"' dormitory/common/index.html || (echo "Wrong common-room mailbox component path" && exit 1)
          grep -q 'href="../style.css"' dormitory/inbox/index.html || (echo "Wrong inbox stylesheet path" && exit 1)
          echo "Shared asset path check passed ✓"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the dormitory folder as the site root
          path: ./dormitory

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
